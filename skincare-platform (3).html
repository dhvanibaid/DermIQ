<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DermIQ — Know Your Skincare</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --green:#4CAF50;--green-light:#81C784;--green-pale:#E8F5E9;
  --cream:#F5F5DC;--peach-bg:#FFF8F5;--peach-mid:#FFE8DE;
  --blue:#5BA4CF;--blue-light:#B3D4F0;--blue-pale:#EBF5FF;
  --red:#E57373;--red-light:#FFCDD2;
  --amber:#F59E0B;
  --text-dark:#2D2424;--text-mid:#5C5050;--text-light:#9C8E8E;
  --white:#FFFFFF;
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 6px 24px rgba(0,0,0,.09);
  --shadow-lg:0 16px 48px rgba(0,0,0,.12);
  --radius-sm:10px;--radius-md:16px;--radius-lg:24px;--radius-xl:32px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--peach-bg);color:var(--text-dark);overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Poppins',sans-serif}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--peach-mid)}
::-webkit-scrollbar-thumb{background:var(--green-light);border-radius:10px}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,248,245,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(76,175,80,.12);padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.3rem;color:var(--text-dark)}
.nav-logo span{color:var(--green)}
.nav-logo .dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{text-decoration:none;color:var(--text-mid);font-size:.9rem;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--green)}
.nav-cta{background:var(--green);color:#fff;border:none;padding:10px 22px;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(76,175,80,.35)}
.nav-cta:hover{background:#43A047;transform:translateY(-1px);box-shadow:0 6px 20px rgba(76,175,80,.4)}

/* ── PAGE TRANSITIONS ── */
.page{animation:fadeSlideIn .45s cubic-bezier(.23,1,.32,1)}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════ */
.home{padding-top:68px}

/* HERO */
.hero{min-height:92vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:60px;padding:80px 80px 40px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(76,175,80,.12) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-80px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(91,164,207,.1) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--green-pale);color:var(--green);font-size:.8rem;font-weight:600;padding:6px 16px;border-radius:50px;margin-bottom:24px;border:1px solid rgba(76,175,80,.2)}
.hero-badge .pulse{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.5)}50%{box-shadow:0 0 0 6px rgba(76,175,80,0)}}
.hero h1{font-size:clamp(2.2rem,4vw,3.4rem);line-height:1.18;font-weight:800;color:var(--text-dark);margin-bottom:20px}
.hero h1 .highlight{color:var(--green);position:relative}
.hero h1 .highlight::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),transparent);border-radius:2px}
.hero-sub{font-size:1.05rem;line-height:1.7;color:var(--text-mid);max-width:460px;margin-bottom:36px}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap}
.btn-primary{background:var(--green);color:#fff;border:none;padding:14px 32px;border-radius:50px;font-family:'Poppins',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px rgba(76,175,80,.38);display:flex;align-items:center;gap:8px}
.btn-primary:hover{background:#43A047;transform:translateY(-2px);box-shadow:0 10px 28px rgba(76,175,80,.42)}
.btn-outline{background:transparent;color:var(--green);border:2px solid var(--green);padding:14px 32px;border-radius:50px;font-family:'Poppins',sans-serif;font-weight:600;font-size:1rem;cursor:pointer;transition:all .25s}
.btn-outline:hover{background:var(--green-pale)}

/* FLOATING INGREDIENT CARDS */
.hero-visual{position:relative;display:flex;align-items:center;justify-content:center;min-height:480px}
.hero-phone{width:260px;height:420px;background:white;border-radius:36px;box-shadow:var(--shadow-lg);padding:20px;position:relative;z-index:2;display:flex;flex-direction:column;gap:12px;border:1.5px solid rgba(76,175,80,.15)}
.phone-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.phone-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.phone-info p:first-child{font-family:'Poppins',sans-serif;font-weight:600;font-size:.85rem}
.phone-info p:last-child{font-size:.75rem;color:var(--green)}
.phone-card{background:var(--green-pale);border-radius:12px;padding:10px 14px;border:1px solid rgba(76,175,80,.2)}
.phone-card.red{background:var(--red-light);border-color:rgba(229,115,115,.2)}
.phone-card.blue{background:var(--blue-pale);border-color:rgba(91,164,207,.2)}
.phone-card-row{display:flex;justify-content:space-between;align-items:center}
.phone-card-row span:first-child{font-weight:600;font-size:.82rem}
.badge-safe{background:var(--green);color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:50px}
.badge-warn{background:var(--red);color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:50px}
.badge-info{background:var(--blue);color:#fff;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:50px}
.phone-card p{font-size:.73rem;color:var(--text-mid);margin-top:4px}
.score-bar{height:5px;background:#E0E0E0;border-radius:10px;margin-top:6px;overflow:hidden}
.score-fill{height:100%;border-radius:10px;transition:width .6s ease}
.score-fill.green{background:var(--green)}
.score-fill.red{background:var(--red)}
.score-fill.blue{background:var(--blue)}

.float-card{position:absolute;background:white;border-radius:16px;padding:12px 16px;box-shadow:var(--shadow-md);border:1px solid rgba(0,0,0,.06);animation:float 6s ease-in-out infinite}
.float-card:nth-child(2){top:30px;right:-20px;animation-delay:0s}
.float-card:nth-child(3){bottom:80px;right:-30px;animation-delay:-2s}
.float-card:nth-child(4){top:100px;left:-30px;animation-delay:-4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.float-card .fc-label{font-size:.7rem;color:var(--text-light);font-weight:500}
.float-card .fc-value{font-family:'Poppins',sans-serif;font-weight:700;font-size:.95rem;color:var(--text-dark)}
.float-card .fc-sub{font-size:.7rem;color:var(--green);font-weight:600}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:0 80px 60px}
.stat-card{background:white;border-radius:var(--radius-md);padding:24px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.04);transition:transform .2s}
.stat-card:hover{transform:translateY(-4px)}
.stat-card .stat-icon{font-size:1.8rem;margin-bottom:8px}
.stat-card .stat-val{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.7rem;color:var(--green)}
.stat-card .stat-label{font-size:.85rem;color:var(--text-mid);margin-top:2px}

/* HOW IT WORKS */
.section{padding:60px 80px}
.section-tag{display:inline-block;background:var(--green-pale);color:var(--green);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:50px;margin-bottom:16px}
.section-title{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;margin-bottom:10px;color:var(--text-dark)}
.section-sub{font-size:1rem;color:var(--text-mid);max-width:520px;line-height:1.6}

.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:48px}
.step-card{background:white;border-radius:var(--radius-md);padding:28px 24px;box-shadow:var(--shadow-sm);position:relative;border:1px solid rgba(0,0,0,.04);transition:all .25s}
.step-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md)}
.step-num{width:40px;height:40px;background:var(--green-pale);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:800;font-size:1rem;color:var(--green);margin-bottom:16px}
.step-card h3{font-size:1rem;font-weight:700;margin-bottom:8px}
.step-card p{font-size:.87rem;color:var(--text-mid);line-height:1.6}
.step-arrow{display:none}

/* INGREDIENTS SHOWCASE */
.ingr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.ingr-showcase{background:white;border-radius:var(--radius-md);padding:22px;box-shadow:var(--shadow-sm);border-left:4px solid var(--green);transition:all .25s;cursor:default}
.ingr-showcase:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.ingr-showcase.warn{border-left-color:var(--red)}
.ingr-showcase.info{border-left-color:var(--blue)}
.ingr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ingr-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem}
.ingr-score{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.1rem}
.ingr-score.green{color:var(--green)}
.ingr-score.red{color:var(--red)}
.ingr-score.blue{color:var(--blue)}
.ingr-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ingr-tag{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:50px}
.ingr-tag.green{background:var(--green-pale);color:var(--green)}
.ingr-tag.red{background:var(--red-light);color:#C62828}
.ingr-tag.blue{background:var(--blue-pale);color:#1565C0}
.ingr-tag.amber{background:#FFF8E1;color:#F57F17}
.ingr-desc{font-size:.83rem;color:var(--text-mid);line-height:1.6}

/* FOOTER */
.footer{background:var(--text-dark);color:rgba(255,255,255,.7);padding:40px 80px;display:flex;justify-content:space-between;align-items:center}
.footer-logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.2rem;color:white}
.footer-logo span{color:var(--green)}
.footer p{font-size:.83rem}

/* ═══════════════════════════════════════
   FORM PAGE
═══════════════════════════════════════ */
.form-page{padding-top:88px;min-height:100vh;padding-bottom:80px}
.form-container{max-width:760px;margin:0 auto;padding:0 24px}
.form-header{text-align:center;margin-bottom:48px}
.form-header h2{font-size:2rem;font-weight:800;margin-bottom:8px}
.form-header p{font-size:1rem;color:var(--text-mid)}

/* PROGRESS */
.progress-wrap{background:white;border-radius:var(--radius-lg);padding:24px 32px;margin-bottom:36px;box-shadow:var(--shadow-sm)}
.progress-steps{display:flex;align-items:center;margin-bottom:16px}
.prog-step{display:flex;align-items:center;gap:8px;flex:1}
.prog-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:.8rem;transition:all .3s;flex-shrink:0}
.prog-dot.active{background:var(--green);color:white;box-shadow:0 4px 12px rgba(76,175,80,.4)}
.prog-dot.done{background:var(--green-light);color:white}
.prog-dot.pending{background:#F0EDE8;color:var(--text-light)}
.prog-label{font-size:.75rem;font-weight:600;color:var(--text-mid)}
.prog-label.active{color:var(--green)}
.prog-line{flex:1;height:2px;background:#F0EDE8;margin:0 8px;border-radius:2px;overflow:hidden}
.prog-line-fill{height:100%;background:var(--green-light);border-radius:2px;transition:width .4s ease}

.prog-bar-wrap{height:6px;background:#F0EDE8;border-radius:10px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:10px;transition:width .5s ease}

/* FORM CARD */
.form-card{background:white;border-radius:var(--radius-lg);padding:36px 40px;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.04)}
.form-step-title{font-size:1.3rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.form-step-sub{font-size:.9rem;color:var(--text-mid);margin-bottom:28px}

.form-group{margin-bottom:24px}
.form-label{display:block;font-weight:600;font-size:.88rem;color:var(--text-dark);margin-bottom:10px}
.form-hint{font-size:.78rem;color:var(--text-light);font-weight:400;margin-left:6px}

/* OPTION CARDS */
.option-grid{display:grid;gap:10px}
.option-grid.cols-2{grid-template-columns:repeat(2,1fr)}
.option-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.option-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.option-card{border:2px solid #F0EDE8;border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;background:white}
.option-card:hover{border-color:var(--green-light);background:var(--green-pale)}
.option-card.selected{border-color:var(--green);background:var(--green-pale)}
.option-card.selected .oc-label{color:var(--green);font-weight:700}
.oc-icon{font-size:1.3rem;flex-shrink:0}
.oc-label{font-size:.88rem;font-weight:500;color:var(--text-dark)}
.oc-desc{font-size:.75rem;color:var(--text-mid);margin-top:1px}

/* MULTI-SELECT CHIPS */
.chip-wrap{display:flex;flex-wrap:wrap;gap:10px}
.chip{border:2px solid #F0EDE8;border-radius:50px;padding:8px 18px;cursor:pointer;transition:all .2s;font-size:.85rem;font-weight:500;color:var(--text-mid);background:white}
.chip:hover{border-color:var(--green-light)}
.chip.selected{border-color:var(--green);background:var(--green-pale);color:var(--green);font-weight:700}

/* SLIDER */
.slider-wrap{padding:8px 0}
.slider{-webkit-appearance:none;width:100%;height:6px;border-radius:10px;background:linear-gradient(90deg,var(--green) var(--pct,50%),#F0EDE8 var(--pct,50%));outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:white;border:3px solid var(--green);box-shadow:0 2px 8px rgba(76,175,80,.4);cursor:pointer}
.slider-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-light);margin-top:8px}
.slider-value{text-align:center;font-family:'Poppins',sans-serif;font-weight:700;font-size:1.3rem;color:var(--green);margin-top:8px}

/* FORM NAVIGATION */
.form-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid #F5F0ED}
.btn-back{background:transparent;border:2px solid #E8E0D8;color:var(--text-mid);padding:12px 24px;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.btn-back:hover{border-color:var(--text-mid)}
.btn-next{background:var(--green);color:white;border:none;padding:12px 32px;border-radius:50px;font-family:'Poppins',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(76,175,80,.35);display:flex;align-items:center;gap:8px}
.btn-next:hover{background:#43A047;transform:translateY(-1px)}
.btn-next:disabled{background:#C8E6C9;box-shadow:none;cursor:not-allowed;transform:none}

/* ═══════════════════════════════════════
   RESULTS DASHBOARD
═══════════════════════════════════════ */
.results-page{padding-top:88px;padding-bottom:80px;min-height:100vh}
.results-container{max-width:1100px;margin:0 auto;padding:0 32px}

/* RESULTS HEADER */
.results-header{background:linear-gradient(135deg,var(--green) 0%,#388E3C 100%);border-radius:var(--radius-xl);padding:36px 44px;color:white;margin-bottom:32px;position:relative;overflow:hidden}
.results-header::before{content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%}
.results-header::after{content:'';position:absolute;bottom:-80px;right:100px;width:200px;height:200px;background:rgba(255,255,255,.05);border-radius:50%}
.results-header h2{font-size:1.8rem;font-weight:800;margin-bottom:6px;position:relative}
.results-header p{font-size:.95rem;opacity:.85;position:relative}
.profile-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;position:relative}
.profile-pill{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:50px;padding:6px 16px;font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.25)}

/* TABS */
.tabs{display:flex;gap:4px;background:white;border-radius:var(--radius-md);padding:6px;box-shadow:var(--shadow-sm);margin-bottom:28px;overflow-x:auto}
.tab-btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;background:transparent;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;cursor:pointer;transition:all .2s;color:var(--text-mid);white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn.active{background:var(--green);color:white;box-shadow:0 4px 12px rgba(76,175,80,.3)}
.tab-btn:hover:not(.active){background:var(--green-pale);color:var(--green)}

/* INGREDIENT RESULT CARDS */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.result-card{background:white;border-radius:var(--radius-md);padding:22px;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.05);transition:all .25s;position:relative;overflow:hidden}
.result-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.result-card.safe{border-top:4px solid var(--green)}
.result-card.warn{border-top:4px solid var(--red)}
.result-card.neutral{border-top:4px solid var(--blue)}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.rc-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;color:var(--text-dark)}
.rc-score-badge{display:flex;flex-direction:column;align-items:center;background:var(--green-pale);border-radius:10px;padding:6px 10px;min-width:52px}
.rc-score-badge.red{background:var(--red-light)}
.rc-score-badge.blue{background:var(--blue-pale)}
.rc-score-val{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.1rem;color:var(--green);line-height:1}
.rc-score-val.red{color:var(--red)}
.rc-score-val.blue{color:var(--blue)}
.rc-score-label{font-size:.62rem;font-weight:600;color:var(--text-light);text-transform:uppercase}
.rc-benefit{font-size:.83rem;color:var(--text-mid);line-height:1.55;margin-bottom:14px}
.rc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.rc-tag{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:50px;background:var(--green-pale);color:var(--green)}
.rc-tag.red{background:var(--red-light);color:#C62828}
.rc-tag.blue{background:var(--blue-pale);color:#1565C0}
.rc-tag.amber{background:#FFF8E1;color:#F57F17}
.rc-bar-wrap{margin-top:4px}
.rc-bar-label{display:flex;justify-content:space-between;font-size:.73rem;font-weight:600;color:var(--text-light);margin-bottom:4px}
.rc-bar{height:6px;background:#F0EDE8;border-radius:10px;overflow:hidden;margin-bottom:8px}
.rc-bar-fill{height:100%;border-radius:10px}
.rc-bar-fill.green{background:linear-gradient(90deg,var(--green),var(--green-light))}
.rc-bar-fill.red{background:linear-gradient(90deg,var(--red),#EF9A9A)}
.rc-bar-fill.blue{background:linear-gradient(90deg,var(--blue),var(--blue-light))}

function AnalysisForm({setPage, setProfile}) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    age:25, gender:'', skinType:'', concerns:[], sensitivity:'',
    budget:'', experience:''
  });

  const steps = [
    {label:'Personal',icon:'👤'},
    {label:'Skin Type',icon:'🌿'},
    {label:'Concerns',icon:'🎯'},
    {label:'Sensitivity',icon:'⚡'},
    {label:'Preferences',icon:'💫'},
  ];
  const progress = ((step)/steps.length)*100;

  const setField = (k,v) => setData(d=>({...d,[k]:v}));
  const toggleConcern = (c) => setData(d=>({
    ...d, concerns: d.concerns.includes(c)
      ? d.concerns.filter(x=>x!==c)
      : [...d.concerns, c]
  }));

  const canNext = () => {
    if(step===0) return data.gender;
    if(step===1) return data.skinType;
    if(step===2) return data.concerns.length>0;
    if(step===3) return data.sensitivity;
    if(step===4) return data.budget && data.experience;
    return true;
  };

  const handleSubmit = () => {
    setProfile(data);
    setPage('results');
  };

  const ageStyle = {'--pct': `${(data.age-13)/(60-13)*100}%`};

  return (
    <div className="form-page page">
      <div className="form-container">
        <div className="form-header">

          <p>Help us understand your skin for a personalized analysis</p>
        </div>

        {/* PROGRESS */}
        <div className="progress-wrap">
          <div className="progress-steps">
            {steps.map((s,i)=>(
              <React.Fragment key={i}>
                <div className="prog-step">
                  <div className={`prog-dot ${i<step?'done':i===step?'active':'pending'}`}>
                    {i<step?'✓':i+1}

                  <span className={`prog-label ${i===step?'active':''}`}>{s.label}</span>

                {i<steps.length-1 && (
                  <div className="prog-line">
                    <div className="prog-line-fill" style={{width:i<step?'100%':'0%'}}/>
                  </div>
                )}
              </React.Fragment>
            ))}
          </div>
          <div className="prog-bar-wrap">

          </div>
        </div>

        {/* FORM CARD */}
        <div className="form-card">
          {/* STEP 0 — PERSONAL */}
          {step===0 && (
            <div className="page">

              <div className="form-group">
                <label className="form-label">Age <span className="form-hint">(drag to set)</span></label>

              <div className="form-group">
                <label className="form-label">Gender</label>
                <div className="option-grid cols-3">
                  {[{v:'Female',icon:'👩'},{v:'Male',icon:'👨'},{v:'Non-binary',icon:'🧑'}].map(g=>(
                    <div key={g.v} className={`option-card ${data.gender===g.v?'selected':''}`}

                      <span className="oc-icon">{g.icon}</span>
                      <div><div className="oc-label">{g.v}</div></div>

                    <div><div className="oc-label">{t.v}</div><div className="oc-desc">{t.d}</div></div>

          {/* STEP 3 — SENSITIVITY */}
          {step===3 && (
            <div className="page">
              <div className="form-step-title">⚡ Sensitivity Level</div>
              <div className="form-step-sub">How does your skin react to new products?</div>

                {[
                  {v:'Low',icon:'🛡️',d:'Rarely reacts'},
                  {v:'Medium',icon:'⚠️',d:'Occasional reactions'},
                  {v:'High',icon:'🚨',d:'Frequently reacts'},
                ].map(s=>(
                  <div key={s.v} className={`option-card ${data.sensitivity===s.v?'selected':''}`}
                    onClick={()=>setField('sensitivity',s.v)}>
                    <span className="oc-icon">{s.icon}</span>
                    <div><div className="oc-label">{s.v}</div><div className="oc-desc">{s.d}</div></div>
                  </div>
                ))}
              </div>

              <div className="form-group">
                <label className="form-label">Do you have any known skin conditions?</label>
                <div className="chip-wrap">
                  {['Eczema','Rosacea','Psoriasis','Dermatitis','None'].map(c=>(
                    <div key={c} className="chip">{c}</div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* STEP 4 — PREFERENCES */}
          {step===4 && (
            <div className="page">
              <div className="form-step-title">💫 Your Preferences</div>

              <div className="form-group">

                  {[
                    {v:'Low',icon:'💚',d:'Under ₹500'},
                    {v:'Medium',icon:'💛',d:'₹500–₹1500'},
                    {v:'High',icon:'💜',d:'₹1500+'},
                  ].map(b=>(
                    <div key={b.v} className={`option-card ${data.budget===b.v?'selected':''}`}
                      onClick={()=>setField('budget',b.v)}>
                      <span className="oc-icon">{b.icon}</span>
                      <div><div className="oc-label">{b.v}</div><div className="oc-desc">{b.d}</div></div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="form-group">
                <label className="form-label">Skincare Experience</label>
                <div className="option-grid cols-3">

                    {v:'Beginner',icon:'🌱',d:'Just starting out'},

        </div>
      </div>
    </div>
  );
}

/* ── RESULTS ── */
function ResultsDashboard({profile, setPage}) {
  const [activeTab, setActiveTab] = useState('recommended');
  const [loading, setLoading] = useState(true);
  const [aiAnalysis, setAiAnalysis] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const barRef = useRef(null);
  const pieRef = useRef(null);
  const radarRef = useRef(null);
  const barChart = useRef(null);
  const pieChart = useRef(null);
  const radarChart = useRef(null);

  const skinKey = profile.skinType?.toLowerCase() || 'normal';
  const recomm = INGREDIENT_DB.recommended[skinKey] || INGREDIENT_DB.recommended.normal;
  const avoid = INGREDIENT_DB.avoid[skinKey] || INGREDIENT_DB.avoid.sensitive;
  const harshness = getHarshnessLevel(profile);
  const harshnessLabel = harshness < 35 ? 'Gentle' : harshness < 60 ? 'Moderate' : 'Harsh';
  const harshnessColor = harshness < 35 ? 'var(--green)' : harshness < 60 ? 'var(--amber)' : 'var(--red)';

  useEffect(()=>{
    const t = setTimeout(()=>setLoading(false), 1800);
    return ()=>clearTimeout(t);
  },[]);

  /* CHARTS */
  useEffect(()=>{
    if(activeTab!=='insights' || loading) return;
    const t = setTimeout(()=>{
      // Bar Chart
      if(barRef.current){
        if(barChart.current) barChart.current.destroy();
        barChart.current = new Chart(barRef.current, {
          type:'bar',
          data:{
            labels:recomm.slice(0,6),
            datasets:[{
              label:'Efficacy Score',
              data:recomm.slice(0,6).map(()=>Math.floor(Math.random()*20)+75),
              backgroundColor:recomm.slice(0,6).map((_,i)=>i%3===0?'#4CAF50':i%3===1?'#5BA4CF':'#81C784'),
              borderRadius:8,
            }]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{y:{beginAtZero:false,min:60,max:100,grid:{color:'rgba(0,0,0,.04)'}},
              x:{grid:{display:false}}}}
        });
      }
      // Pie Chart
      if(pieRef.current){
        if(pieChart.current) pieChart.current.destroy();
        const concerns = profile.concerns?.length ? profile.concerns : ['Hydration','Acne','Dullness'];
        pieChart.current = new Chart(pieRef.current, {
          type:'doughnut',
          data:{
            labels:concerns,
            datasets:[{data:concerns.map(()=>Math.floor(Math.random()*25)+10),
              backgroundColor:['#4CAF50','#5BA4CF','#F59E0B','#E57373','#9C27B0','#00BCD4'],
              borderWidth:0, hoverOffset:6}]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:11}}}}}
        });
      }
      // Radar Chart
      if(radarRef.current){
        if(radarChart.current) radarChart.current.destroy();
        radarChart.current = new Chart(radarRef.current, {
          type:'radar',
          data:{
            labels:['Hydration','Barrier','Brightening','Anti-aging','Acne Control','Soothing'],
            datasets:[{
              label:'Your Profile',
              data:[85,78,65,70,82,90],
              fill:true,
              backgroundColor:'rgba(76,175,80,.15)',
              borderColor:'#4CAF50',
              pointBackgroundColor:'#4CAF50',
              borderWidth:2,
            }]
          },
          options:{responsive:true,maintainAspectRatio:false,
            scales:{r:{grid:{color:'rgba(0,0,0,.06)'},ticks:{display:false},beginAtZero:true,max:100}},
            plugins:{legend:{display:false}}}
        });
      }
    }, 100);
    return ()=>clearTimeout(t);
  },[activeTab, loading]);

  /* AI ANALYSIS */
  const fetchAI = useCallback(async()=>{
    if(aiAnalysis) return;
    setAiLoading(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          messages:[{
            role:'user',
            content:`You are a dermatologist AI. Based on this profile:
- Age: ${profile.age}, Gender: ${profile.gender}
- Skin type: ${profile.skinType}
- Concerns: ${profile.concerns?.join(', ')||'general'}
- Sensitivity: ${profile.sensitivity}
- Budget: ${profile.budget} (Indian market ₹)
- Experience: ${profile.experience}

Give a personalized skincare analysis in 3-4 concise paragraphs:
1. Skin profile summary
2. Key ingredient priorities for this profile
3. Top 2 Indian budget-friendly product recommendations (real brands like Minimalist, Plum, Dot & Key, The Derma Co, Re'equil)
4. One important caution specific to this profile

Keep it practical, science-based, and India-focused. No lists, just flowing prose.`
          }]
        })
      });
      const d = await res.json();
      setAiAnalysis(d.content?.[0]?.text || 'Analysis unavailable.');
    } catch(e) {
      setAiAnalysis('Your personalized AI analysis encountered an issue. Please try again.');
    }
    setAiLoading(false);

    if(activeTab==='recommended' && !aiAnalysis && !aiLoading) fetchAI();

                <div key={i} className="alt-card">
                  <div className="alt-side harsh">
                    <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--red)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'4px'}}>⚠️ Common Choice</div>
                    <div className="alt-ingr-name">{a.harsh}</div>
                    <div className="alt-ingr-desc">Higher irritation potential, especially for beginners</div>
                  </div>
                  <div className="alt-arrow">
                    <div className="alt-arrow-icon">→</div>
                    <div className="alt-arrow-label">swap</div>
                  </div>
                  <div className="alt-side gentle">
                    <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--green)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'4px'}}>✅ Gentler Alternative</div>
                    <div className="alt-ingr-name">{a.gentle}</div>
                    <div className="alt-ingr-desc">{a.reason}</div>
                    <div style={{fontSize:'.75rem',color:'var(--green)',fontWeight:600,marginTop:'6px'}}>🇮🇳 {a.brands}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── HARSHNESS ── */}
        {activeTab==='harshness' && (
          <div className="page">
            <div className="harshness-section" style={{marginBottom:'24px'}}>
              <h3 className="harshness-title">⚡ Harshness Meter for Your Profile</h3>
              <p className="harshness-sub">Overall ingredient harshness tolerance based on your skin type, sensitivity and experience level</p>
              <div style={{textAlign:'center',marginBottom:'8px'}}>
                <span style={{fontFamily:'Poppins',fontWeight:800,fontSize:'2rem',color:harshnessColor}}>{harshnessLabel}</span>
                <span style={{fontSize:'1rem',color:'var(--text-mid)',marginLeft:'8px'}}>({harshness}/100)</span>
              </div>
              <div className="harshness-meter">
                <div className="meter-track"/>
                <div className="meter-needle" style={{left:`${harshness}%`}}>●</div>
              </div>
              <div className="meter-labels">
                <span className="meter-label" style={{color:'var(--green)'}}>🌱 Gentle</span>
                <span className="meter-label" style={{color:'var(--amber)'}}>⚡ Moderate</span>
                <span className="meter-label" style={{color:'var(--red)'}}>🔥 Harsh</span>
              </div>
              <div style={{marginTop:'20px',padding:'16px',background:'var(--peach-bg)',borderRadius:'12px',fontSize:'.85rem',lineHeight:1.6}}>
                {harshness<35 && <p>Your profile is well-suited for <strong>gentle, barrier-supportive ingredients</strong>. Prioritize ceramides, centella, and fragrance-free formulas. You can use most beginner-safe actives comfortably.</p>}
                {harshness>=35 && harshness<60 && <p>Your profile tolerates <strong>moderate actives</strong> well. You can use niacinamide, low-% AHAs, and vitamin C effectively. Introduce new actives one at a time and patch test.</p>}
                {harshness>=60 && <p>Your profile indicates <strong>sensitivity to harsh actives</strong>. Avoid alcohol-based products, fragrance, strong retinoids and high-% acids. Build tolerance gradually with patch testing.</p>}
              </div>
            </div>

            <div className="harshness-section">
              <h3 style={{fontWeight:700,fontSize:'1rem',marginBottom:'20px'}}>Harshness by Category</h3>
              <div className="harshness-breakdown">
                {[
                  {name:'Exfoliants',pct:harshness,color:'var(--amber)'},
                  {name:'Retinoids',pct:Math.min(95,harshness+15),color:'var(--red)'},
                  {name:'Actives (Vit C)',pct:Math.max(20,harshness-10),color:'var(--amber)'},
                  {name:'Moisturizers',pct:Math.max(10,harshness-40),color:'var(--green)'},
                  {name:'Cleansers',pct:Math.max(15,harshness-20),color:'var(--blue)'},
                  {name:'Sunscreens',pct:Math.max(10,harshness-45),color:'var(--green)'},
                ].map((h,i)=>{
                  const lvl = h.pct<35?'Gentle':h.pct<60?'Moderate':'Harsh';
                  return (
                    <div key={i} className="hb-card">
                      <div className="hb-name">{h.name}</div>
                      <div className="hb-bar"><div className="hb-bar-fill" style={{width:`${h.pct}%`,background:h.color}}/></div>
                      <div className="hb-level" style={{color:h.color}}>{lvl}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── COST ── */}
        {activeTab==='cost' && (
          <div className="page">
            <div className="cost-section">
              <h3 style={{fontWeight:700,fontSize:'1.1rem',marginBottom:'4px'}}>💰 Cost-Effectiveness Analysis</h3>
              <p style={{fontSize:'.85rem',color:'var(--text-mid)',marginBottom:'6px'}}>India-focused pricing for recommended ingredients (updated 2025)</p>
              <div style={{background:'var(--green-pale)',borderRadius:'10px',padding:'10px 16px',fontSize:'.83rem',color:'var(--green)',fontWeight:600,marginBottom:'20px'}}>
                🏷️ Budget Range: {profile.budget} — {profile.budget==='Low'?'Under ₹500/product':profile.budget==='Medium'?'₹500–₹1500':' ₹1500+ premium range'}
              </div>
              <div className="cost-grid">
                {COST_DATA.map((c,i)=>(
                  <div key={i} className="cost-card">
                    <div className="cost-product">{c.product}</div>
                    <div className="cost-price">{c.price}</div>
                    <div className="cost-ml">{c.per100}</div>
                    <div style={{fontSize:'.72rem',color:'var(--text-light)',marginBottom:'6px'}}>Effectiveness</div>
                    <div className="cost-eff-bar"><div className="cost-eff-fill" style={{width:`${c.eff}%`}}/></div>
                    <div className="cost-eff-label">{c.eff}% efficacy</div>
                    <div className="cost-brand">🇮🇳 {c.brand}</div>
                    {c.vfm && <div className="vfm-badge">⭐ Best Value</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── ROUTINE ── */}
        {activeTab==='routine' && (
          <div className="page">
            <div className="routine-section">
              <h3 style={{fontWeight:700,fontSize:'1.1rem',marginBottom:'4px'}}>
                🌙 {profile.experience==='Beginner'?'Beginner-Safe ':''}{profile.skinType} Skin Routine
              </h3>
              <p style={{fontSize:'.85rem',color:'var(--text-mid)',marginBottom:'24px'}}>
                A simple, effective AM/PM routine tailored to your profile
              </p>

              <div style={{fontFamily:'Poppins',fontWeight:700,fontSize:'.9rem',color:'var(--amber)',marginBottom:'12px'}}>☀️ Morning Routine</div>
              <div className="routine-steps" style={{marginBottom:'28px'}}>
                {[
                  {step:'Gentle Cleanser',detail:`Use a mild, ${profile.skinType==='Oily'?'foaming gel':'cream or milk'} cleanser. Avoid SLS.`,product:'Cetaphil Gentle Cleanser / Plum Amino Cleanser',type:'am'},
                  {step:'Toner / Essence',detail:'Apply a hydrating toner to prep skin and balance pH.',product:'Minimalist PHA 3% Toner / Some By Mi AHA BHA',type:'am'},
                  {step:'Serum',detail:`${profile.concerns?.includes('Pigmentation')?'Vitamin C serum for brightening':'Niacinamide serum to control oil & pores'}`,product:'Minimalist Vitamin C 10% / Niacinamide 10%',type:'am'},
                  {step:'Moisturiser',detail:'Light gel-cream or lotion to lock in actives.',product:'Neutrogena Hydro Boost / Dot & Key Water Drench',type:'am'},
                  {step:'SPF (Mandatory!)',detail:'Apply broad-spectrum SPF 50 every single morning, rain or shine.',product:"Re'equil Ultra Matte SPF 50 / Minimalist SPF 50",type:'am'},
                ].map((r,i)=>(
                  <div key={i} className="routine-step am">
                    <div className="rs-num am">{i+1}</div>
                    <div className="rs-content">
                      <h4>{r.step}</h4>
                      <p>{r.detail}</p>
                      <div className="rs-product">🇮🇳 {r.product}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{fontFamily:'Poppins',fontWeight:700,fontSize:'.9rem',color:'var(--blue)',marginBottom:'12px'}}>🌙 Evening Routine</div>
              <div className="routine-steps">
                {[
                  {step:'Cleanse Thoroughly',detail:'Double cleanse if wearing sunscreen or makeup.',product:'Banila Co Clean It Zero / Minimalist Face Wash',type:'pm'},
                  {step:'Exfoliant (2-3x/week)',detail:`${profile.skinType==='Sensitive'?'Use lactic acid 5% only, not AHAs':'BHA or AHA depending on concerns'}`,product:'Minimalist AHA 25%+BHA 2% / Lactic Acid 10%',type:'pm'},
                  {step:'Treatment Serum',detail:`${profile.concerns?.includes('Aging')?'Bakuchiol or low-% retinol (start slow)':'Niacinamide or azelaic acid for concerns'}`,product:'Minimalist Bakuchiol 0.5% / Azelaic Acid 10%',type:'pm'},
                  {step:'Eye Cream (optional)',detail:'Gentle peptide or caffeine eye cream.',product:'The Ordinary Caffeine Solution 5% / Plum Bright',type:'pm'},
                  {step:'Night Moisturiser',detail:'Richer cream or sleeping mask to repair skin overnight.',product:'Cetaphil Moisturizing Cream / Dot & Key Sleep Mask',type:'pm'},
                ].map((r,i)=>(
                  <div key={i} className="routine-step pm">
                    <div className="rs-num pm">{i+1}</div>
                    <div className="rs-content">
                      <h4>{r.step}</h4>
                      <p>{r.detail}</p>
                      <div className="rs-product" style={{color:'var(--blue)'}}>🇮🇳 {r.product}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── INSIGHTS ── */}
        {activeTab==='insights' && (
          <div className="page">
            <div className="charts-grid">
              <div className="chart-card">
                <h3>Ingredient Efficacy Scores</h3>
                <p>Top recommended ingredients for your skin type</p>
                <div className="chart-container"><canvas ref={barRef}/></div>
              </div>
              <div className="chart-card">
                <h3>Concern Distribution</h3>
                <p>How your concerns break down by priority</p>
                <div className="chart-container"><canvas ref={pieRef}/></div>
              </div>
              <div className="chart-card" style={{gridColumn:'1/-1'}}>
                <h3>Skin Needs Radar</h3>
                <p>Your skin's specific need levels across key categories</p>
                <div className="chart-container" style={{height:'260px'}}><canvas ref={radarRef}/></div>
              </div>
            </div>

            {/* COMPARE */}
            <div className="compare-section" style={{marginTop:'24px'}}>
              <h3 style={{fontWeight:700,fontSize:'1.1rem',marginBottom:'4px'}}>🔍 Product Comparison</h3>
              <p style={{fontSize:'.85rem',color:'var(--text-mid)'}}>Minimalist Niacinamide vs Vitamin C — which suits your profile better?</p>
              <div className="compare-grid">
                {[
                  {name:'Minimalist Niacinamide 10%',rows:[['Price','₹549'],['Key Ingredient','Niacinamide 10%'],['Skin Type','All Types'],['Concern','Pores, Oil, Brightness'],['Safety','Very Safe (9.2/10)'],['Beginner Safe','✅ Yes']]},
                  {name:'Minimalist Vitamin C 10%',rows:[['Price','₹699'],['Key Ingredient','Ascorbic Acid 10%'],['Skin Type','Normal/Oily'],['Concern','Pigmentation, Aging'],['Safety','Safe (8.8/10)'],['Beginner Safe','⚠️ Patch test first']]},
                ].map((col,i)=>(
                  <div key={i} className="compare-col">
                    <h3>{col.name}</h3>
                    {col.rows.map(([l,v],j)=>(
                      <div key={j} className="compare-row">
                        <span className="cr-label">{l}</span>
                        <span className="cr-val">{v}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* BACK BUTTON */}
        <div style={{textAlign:'center',marginTop:'40px'}}>
          <button className="btn-outline" onClick={()=>setPage('form')} style={{marginRight:'16px'}}>
            ← Redo Analysis
          </button>
          <button className="btn-primary" style={{display:'inline-flex'}} onClick={()=>setPage('home')}>
            🏠 Home
          </button>
        </div>
      </div>
    </div>
  );
}

/* ──────────────────────────
   APP
──────────────────────────── */
function App() {
  const [page, setPage] = useState('home');
  const [profile, setProfile] = useState(null);

  const handleSetPage = (p) => {
    window.scrollTo({top:0, behavior:'smooth'});
    setPage(p);
  };

  return (
    <>
      <Navbar page={page} setPage={handleSetPage}/>
      {page==='home' && <HomePage setPage={handleSetPage}/>}
      {page==='form' && <AnalysisForm setPage={handleSetPage} setProfile={setProfile}/>}
      {page==='results' && profile && <ResultsDashboard profile={profile} setPage={handleSetPage}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
